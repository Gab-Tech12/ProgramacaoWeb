<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="./style/styles.css" />
  <title>BrandBuzz</title>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="./assets/images/logo.png" alt="logotipo">
      </div>
      <nav class="menu">
        <ul>
          <li><a class="active" href="#">Home</a></li>
          <li><a href="#">About us</a></li>
          <li><a href="#">Service</a></li>
          <li><a href="#">Contact us</a></li>
          <li><a href="#">Blog</a></li>
        </ul>
      </nav>
      <div class="sign">
        <button class="btn-signup">Sign Up</button>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-text">
          <h1>We create <span>solutions</span> for your business</h1>
          <p>
            Our team keeps a keen eye on emerging trends and technologies to ensure your marketing campaigns remain cutting-edge.
          </p>
          <button class="btn-started">Get Started</button>
          
          <a href="#" class="explore-link">
            <div class="icon-circle">
              <i class="fa-solid fa-chevron-down"></i>
            </div>
            <span>Explore more</span>
          </a>
        </div>
        <div class="hero-banner">
          <img src="./assets/images/banner.png" alt="Banner BrandBuzz">
        </div>
      </section>
    </main>
  </div>
</body>
</html>
